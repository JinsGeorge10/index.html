<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medibank Verification Demo</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f4f6f8; margin:0; }
    .topbar { background:#0057b8; color:#fff; padding:14px 20px; font-weight:700; }
    .wrap { max-width:900px; margin:30px auto; padding:0 20px; }
    .card {
      max-width:420px; background:#fff; border:1px solid #dbe3ef; border-radius:16px;
      box-shadow:0 10px 30px rgba(0,0,0,.08); padding:24px; margin-bottom:24px;
    }
    .banner {
      background:#fff4e5; color:#92400e; padding:10px 12px; border-radius:10px;
      border:1px solid #f2d3a2; margin-bottom:16px; font-size:14px;
    }
    label { display:block; margin:12px 0 6px; font-weight:600; }
    input {
      width:100%; padding:12px; border:1px solid #cfd8e3; border-radius:10px;
      font-size:14px; box-sizing:border-box;
    }
    button {
      margin-top:16px; padding:12px 14px; border:none; border-radius:10px;
      background:#0057b8; color:#fff; font-weight:700; cursor:pointer;
    }
    .secondary { background:#374151; margin-left:8px; }
    .result {
      margin-top:16px; padding:12px; border-radius:10px; background:#fef2f2;
      color:#b91c1c; border:1px solid #fecaca; display:none;
    }
    table {
      width:100%; border-collapse:collapse; background:#fff; border:1px solid #dbe3ef;
      border-radius:12px; overflow:hidden;
    }
    th, td { padding:12px; border-bottom:1px solid #e5e7eb; text-align:left; font-size:14px; }
    th { background:#f9fafb; }
    .note { color:#6b7280; font-size:13px; margin:8px 0 16px; }
  </style>
</head>
<body>
  <div class="topbar">Medibank Verification Portal</div>

  <div class="wrap">
    <div class="card">
      <div class="banner">
        <strong>Educational simulation only.</strong>
        This demo does not store real credentials. Passwords are never saved.
      </div>

      <label for="email">Email</label>
      <input id="email" type="email" placeholder="student@example.com" />

      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Enter password" />

      <button onclick="simulate()">Verify account</button>
      <button class="secondary" onclick="downloadCSV()">Download CSV report</button>

      <div id="result" class="result"></div>
    </div>

    <div class="note">
      Demo log below shows masked, simulated entries only. The exported CSV opens in Excel.
    </div>

    <table id="logTable">
      <thead>
        <tr>
          <th>Time</th>
          <th>Email</th>
          <th>Password</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    const demoRows = [];

    function maskEmail(email) {
      if (!email || !email.includes("@")) return "[demo-entry]";
      const [name, domain] = email.split("@");
      const safeName = name.length <= 2 ? "*".repeat(name.length) : name.slice(0, 2) + "***";
      return safeName + "@" + domain;
    }

    function simulate() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const now = new Date().toLocaleString();
      const maskedEmail = maskEmail(email || "student@example.com");
      const maskedPassword = "*".repeat(Math.max(8, password.length || 8));

      demoRows.push({
        time: now,
        email: maskedEmail,
        password: maskedPassword,
        status: "SIMULATED - no real storage"
      });

      renderTable();

      const result = document.getElementById("result");
      result.style.display = "block";
      result.innerHTML =
        "<strong>Simulation complete.</strong><br><br>" +
        "A masked demo entry was added to the report table." +
        "<br>Real credentials were not stored.";
      
      document.getElementById("password").value = "";
    }

    function renderTable() {
      const tbody = document.querySelector("#logTable tbody");
      tbody.innerHTML = "";
      demoRows.forEach(row => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${row.time}</td>
          <td>${row.email}</td>
          <td>${row.password}</td>
          <td>${row.status}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function downloadCSV() {
      const rows = [
        ["Time", "Email", "Password", "Status"],
        ...demoRows.map(r => [r.time, r.email, r.password, r.status])
      ];

      const csv = rows.map(row =>
        row.map(value => `"${String(value).replace(/"/g, '""')}"`).join(",")
      ).join("\\n");

      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "medibank_simulation_report.csv";
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
